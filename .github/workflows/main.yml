name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 3600
    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 1 -Force
          
          netsh advfirewall firewall delete rule name="RDP-Tailscale" -ErrorAction SilentlyContinue
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Configure runneradmin for RDP
        run: |
          $username = "runneradmin"
          $password = "P@ssw0rd123!"
          Enable-LocalUser -Name $username
          Set-LocalUser -Name $username -Password (ConvertTo-SecureString -AsPlainText $password -Force)
          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue
          
          echo "RDP_USER=$username" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned."; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      # ==================== OPTIMIZED DOCKER FOR LINUX CONTAINER ====================
      - name: Enable Linux Containers on Docker
        run: |
          Write-Host "Switching Docker to Linux containers mode..."
          & "C:\Program Files\Docker\Docker\Docker Desktop.exe" --switch-to-linux 2>$null || echo "Switch command not available, trying alternative..."
          
          # Tunggu Docker siap
          $timeout = 60
          $timer = 0
          while ($timer -lt $timeout) {
              if (docker info 2>$null) {
                  Write-Host "Docker is ready!"
                  break
              }
              Start-Sleep -Seconds 5
              $timer += 5
          }

      - name: Run n8n
        run: |
          Write-Host "Pulling and starting n8n..."
          docker run -d `
            --name n8n `
            --restart unless-stopped `
            -p 5678:5678 `
            -v n8n_data:/home/node/.n8n `
            docker.n8n.io/n8nio/n8n

          Write-Host "✅ n8n container started"

      - name: Verify
        run: |
          Write-Host "`n=== ACCESS INFO ==="
          Write-Host "RDP IP     : $env:TAILSCALE_IP"
          Write-Host "Username   : $env:RDP_USER"
          Write-Host "Password   : $env:RDP_PASS"
          Write-Host "n8n URL    : http://$env:TAILSCALE_IP:5678"
          Write-Host "`nDocker Containers:"
          docker ps

      - name: Maintain Connection
        run: |
          while ($true) {
              Write-Host "[$(Get-Date)] RDP + n8n Active"
              Start-Sleep -Seconds 300
          }
